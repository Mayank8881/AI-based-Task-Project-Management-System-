<div class="border p-6 rounded shadow bg-white mb-8">

    <h2 class="text-xl font-bold mb-4">Create Task</h2>

    <div class="space-y-3">

        <!-- Project Select -->

        <select
            class="border p-2 w-full rounded"
            (change)="projectId.set(+$any($event.target).value)"
        >

            <option value="">Select Project</option>

            @for (p of projects(); track p.id) {

            <option [value]="p.id">
                {{p.name}}
            </option>

            }

        </select>

        <!-- Title -->

        <input
            type="text"
            placeholder="Task Title"
            class="border p-2 w-full rounded"
            [value]="title()"
            (input)="title.set($any($event.target).value)"
        />

        <!-- Status -->

        <select
            class="border p-2 w-full rounded"
            (change)="status.set($any($event.target).value)"
        >

            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>

        </select>

        <!-- Assignee -->

        <input
            type="text"
            placeholder="Assignee"
            class="border p-2 w-full rounded"
            [value]="assignee()"
            (input)="assignee.set($any($event.target).value)"
        />

        <!-- Created By -->

        <input
            type="text"
            placeholder="Created By"
            class="border p-2 w-full rounded"
            [value]="createdBy()"
            (input)="createdBy.set($any($event.target).value)"
        />

        <button
            (click)="createTask()"
            class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">

            Create Task

        </button>

    </div>

</div>
